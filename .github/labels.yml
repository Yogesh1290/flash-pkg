# Priority Labels
- name: "priority: critical"
  color: "d73a4a"
  description: "Critical issue that blocks users"

- name: "priority: high"
  color: "ff6b6b"
  description: "High priority issue"

- name: "priority: medium"
  color: "fbca04"
