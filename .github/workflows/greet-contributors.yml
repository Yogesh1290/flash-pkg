name: Greet New Contributors

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - name: Greet new issue creator
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const creator = issue.user.login;
            
            // Check if this is their first issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: creator,
              state: 'all'
            });
            
            if (issues.data.length === 1) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `👋 Welcome @${creator}! Thanks for opening your first issue!\n\n` +
                      `We appreciate your contribution to flash-pkg. Someone will review your issue soon.\n\n` +
                      `In the meantime:\n` +
                      `- ⭐ Star the repo if you find it useful\n` +
                      `- 📖 Check out our [documentation](https://github.com/Yogesh1290/flash-pkg#readme)\n` +
                      `- 💬 Join the [discussions](https://github.com/Yogesh1290/flash-pkg/discussions)`
              });
            }
      
      - name: Greet new PR creator
        if: github.event_name == 'pull_request_target'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const creator = pr.user.login;
            
            // Check if this is their first PR
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              creator: creator
            });
            
            if (prs.data.length === 1) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `🎉 Congratulations @${creator} on your first Pull Request!\n\n` +
                      `Thank you for contributing to flash-pkg! Your PR will be reviewed soon.\n\n` +
                      `Please make sure:\n` +
                      `- ✅ All tests pass\n` +
                      `- ✅ Code follows our style guidelines\n` +
                      `- ✅ Documentation is updated if needed\n\n` +
                      `We're excited to have you as a contributor! 🚀`
              });
            }
