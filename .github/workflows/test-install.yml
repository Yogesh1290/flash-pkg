name: Test Install Scripts

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-linux:
    name: Test on Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Test install.sh
        run: |
          bash install.sh
      
      - name: Check if uv is installed
        run: |
          ~/.local/bin/uv --version || echo "uv not found"
      
      - name: Check if flash function exists
        run: |
          grep -q "flash()" ~/.bashrc && echo "flash function found" || echo "flash function not found"

  test-macos:
    name: Test on macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Test install.sh
        run: |
          bash install.sh
      
      - name: Check if uv is installed
        run: |
          ~/.local/bin/uv --version || echo "uv not found"
      
      - name: Check if flash function exists
        run: |
          grep -q "flash()" ~/.bashrc && echo "flash function found" || echo "flash function not found"

  test-windows:
    name: Test on Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Test install.ps1
        shell: pwsh
        run: |
          .\install.ps1
      
      - name: Check if uv is installed
        shell: pwsh
        run: |
          if (Test-Path "$env:USERPROFILE\.cargo\bin\uv.exe") {
            Write-Host "uv found"
            & "$env:USERPROFILE\.cargo\bin\uv.exe" --version
          } else {
            Write-Host "uv not found"
          }
