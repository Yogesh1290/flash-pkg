name: Test Install Scripts

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-syntax:
    name: Verify Script Syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check install.sh syntax
        run: |
          bash -n install.sh
          echo "✅ install.sh syntax is valid"
      
      - name: Check install.ps1 syntax
        shell: pwsh
        run: |
          Get-Content .\install.ps1 | Out-Null
          Write-Host "✅ install.ps1 syntax is valid"
      
      - name: Verify files exist
        run: |
          test -f README.md && echo "✅ README.md exists"
          test -f CONTRIBUTING.md && echo "✅ CONTRIBUTING.md exists"
          test -f LICENSE && echo "✅ LICENSE exists"
