name: Verify Repository

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  verify:
    name: Verify Files and Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Verify required files exist
        run: |
          echo "Checking required files..."
          test -f README.md && echo "✅ README.md"
          test -f CONTRIBUTING.md && echo "✅ CONTRIBUTING.md"
          test -f LICENSE && echo "✅ LICENSE"
          test -f install.sh && echo "✅ install.sh"
          test -f install.ps1 && echo "✅ install.ps1"
          test -f ROADMAP.md && echo "✅ ROADMAP.md"
          echo "All required files present!"
      
      - name: Check install.sh syntax
        run: |
          bash -n install.sh && echo "✅ install.sh syntax valid"
      
      - name: Verify documentation
        run: |
          test -d docs && echo "✅ docs/ directory exists"
          test -d test-examples && echo "✅ test-examples/ directory exists"
          test -d .github && echo "✅ .github/ directory exists"
          echo "Repository structure verified!"
