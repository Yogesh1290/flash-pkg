name: Test Install Scripts

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-linux:
    name: Test on Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Test install.sh
        run: |
          bash install.sh
      
      - name: Check if uv is installed
        run: |
          ~/.local/bin/uv --version || echo "uv not found"
      
      - name: Check if flash function exists
        run: |
          grep -q "flash()" ~/.bashrc && echo "flash function found" || echo "flash function not found"

  test-macos:
    name: Test on macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Test install.sh
        run: |
          bash install.sh
      
      - name: Check if uv is installed
        run: |
          ~/.local/bin/uv --version || echo "uv not found"
      
      - name: Check if flash function exists
        run: |
          grep -q "flash()" ~/.bashrc && echo "flash function found" || echo "flash function not found"

  test-windows:
    name: Test on Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Test install.ps1 (skip actual installation in CI)
        shell: pwsh
        run: |
          # Just verify the script syntax is valid
          Get-Content .\install.ps1 | Out-Null
          Write-Host "install.ps1 syntax is valid"
      
      - name: Verify script structure
        shell: pwsh
        run: |
          $content = Get-Content .\install.ps1 -Raw
          if ($content -match "flash-pkg") {
            Write-Host "Script contains flash-pkg references"
          }
          if ($content -match "function flash") {
            Write-Host "Script contains flash function"
          }
